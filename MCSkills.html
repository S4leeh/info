<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4leeh Minecraft Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --widget-bg: #111111;
            --khalid-color: #00bfff;
            --raheeb-color: #00ff44;
            --step-bg: #222;
            --text-main: #ffffff;
            --border-color: #333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .stream-display {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .arena-widget {
            width: 90%;
            max-width: 850px;
            background: var(--widget-bg);
            border-radius: 20px;
            padding: 0;
            border: 3px solid var(--border-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            overflow: hidden;
            position: relative;
        }

        /* حاوية الهوية (الشعار + العنوان) */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 2px solid var(--border-color);
            padding: 20px;
            gap: 25px;
        }

        .brand-logo {
            height: 70px; /* حجم الشعار */
            filter: drop-shadow(0 0 10px rgba(0, 191, 255, 0.3));
        }

        .challenge-title {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .arena-content {
            padding: 40px;
        }

        .player-row {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .player-row:last-child { margin-bottom: 0; }

        .name-tag {
            width: 140px;
            font-size: 1.7rem;
            font-weight: 700;
            margin-left: 20px;
        }

        .steps-wrapper {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .step-box {
            height: 45px;
            background: var(--step-bg);
            border-radius: 10px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .active-khalid { background: var(--khalid-color); box-shadow: 0 0 25px var(--khalid-color); border: none; }
        .active-raheeb { background: var(--raheeb-color); box-shadow: 0 0 25px var(--raheeb-color); border: none; }

        /* حقوق الموقع بشكل هادئ */
        .watermark {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 0.8rem;
            color: #444;
            font-weight: bold;
        }

        #result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        #result-overlay.show { opacity: 1; visibility: visible; }

        #result-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            padding: 20px;
        }

        .control-panel {
            width: 100%;
            background: #000;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            border-top: 5px solid #222;
        }

        .admin-btn {
            padding: 15px 35px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-k { background: var(--khalid-color); color: #000; }
        .btn-r { background: var(--raheeb-color); color: #000; }
        .btn-reset { background: #333; color: #fff; }

        .admin-btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="stream-display">
        <div class="arena-widget">
            <div class="header-container">
                <img src="logo.png" alt="S4leeh Logo" class="brand-logo">
                <h1 class="challenge-title">من الأكثر مهارة في ماين كرافت؟</h1>
            </div>
            
            <div class="arena-content">
                <div class="player-row">
                    <div class="name-tag" style="color: var(--khalid-color);">خالد</div>
                    <div class="steps-wrapper" id="khalid-track">
                        <div class="step-box"></div><div class="step-box"></div><div class="step-box"></div><div class="step-box"></div>
                    </div>
                </div>

                <div class="player-row">
                    <div class="name-tag" style="color: var(--raheeb-color);">رهيب</div>
                    <div class="steps-wrapper" id="raheeb-track">
                        <div class="step-box"></div><div class="step-box"></div><div class="step-box"></div><div class="step-box"></div>
                    </div>
                </div>
            </div>

            <div class="watermark">s4leeh.com</div>

            <div id="result-overlay">
                <div id="result-text"></div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <button class="admin-btn btn-k" onclick="addPoint('khalid')">+ نقطة لـ خالد</button>
        <button class="admin-btn btn-r" onclick="addPoint('raheeb')">+ نقطة لـ رهيب</button>
        <button class="admin-btn btn-reset" onclick="resetChallenge()">إعادة تعيين</button>
    </div>

    <script>
        let scores = { khalid: 0, raheeb: 0 };
        let gameFinished = false;

        function addPoint(player) {
            if (gameFinished) return;
            scores[player]++;
            updateDisplay();
            checkRules();
        }

        function updateDisplay() {
            const kSteps = document.querySelectorAll('#khalid-track .step-box');
            kSteps.forEach((box, i) => {
                if (i < scores.khalid) box.classList.add('active-khalid');
                else box.classList.remove('active-khalid');
            });

            const rSteps = document.querySelectorAll('#raheeb-track .step-box');
            rSteps.forEach((box, i) => {
                if (i < scores.raheeb) box.classList.add('active-raheeb');
                else box.classList.remove('active-raheeb');
            });
        }

        function checkRules() {
            const overlay = document.getElementById('result-overlay');
            const text = document.getElementById('result-text');
            
            if (scores.khalid === 2 && scores.raheeb === 2) {
                showResult("تعادل عادل! ⚔️", "#aaaaaa");
            } else if (scores.khalid === 3) {
                showResult("خالد هو الأمهر! 👑", "var(--khalid-color)");
            } else if (scores.raheeb === 3) {
                showResult("رهيب هو الأمهر! 👑", "var(--raheeb-color)");
            }
        }

        function showResult(msg, color) {
            const overlay = document.getElementById('result-overlay');
            const text = document.getElementById('result-text');
            text.innerText = msg;
            text.style.color = color;
            overlay.classList.add('show');
            gameFinished = true;
        }

        function resetChallenge() {
            scores = { khalid: 0, raheeb: 0 };
            gameFinished = false;
            document.getElementById('result-overlay').classList.remove('show');
            updateDisplay();
        }
    </script>
</body>
</html>
